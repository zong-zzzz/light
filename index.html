<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大哥 到底會不會啊</title>
    <style>
        :root { --hot: #440000; --hot-live: #ff3d00; --neu: #001a44; --neu-live: #2979ff; --gnd: #003300; --gnd-live: #4caf50; --bg: #0b0b0b; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #1a1a1b; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #333; padding: 30px; border-radius: 12px; box-shadow: 0 0 80px #000; width: 1200px; position: relative; border: 4px solid #444; }
        
        #boom_layer { 
            position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 900px; height: 380px; 
            background: rgba(180, 0, 0, 0.98); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; 
            color: yellow; text-align: center; border-radius: 20px; border: 8px solid #fff; box-shadow: 0 0 100px #ff0000; pointer-events: none;
        }

        .header { background: #222; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #f1c40f; }
        .controls { display: flex; align-items: center; gap: 15px; }
        select { padding: 10px; background: #444; color: #fff; border: 2px solid #f1c40f; border-radius: 5px; cursor: pointer; }
        .breaker { padding: 15px 35px; font-size: 18px; font-weight: 900; cursor: pointer; border: none; background: #444; color: #888; border-radius: 5px; transition: 0.3s; }
        .breaker.on { background: #d35400; color: #fff; box-shadow: 0 0 20px #d35400; }
        .mute-toggle { cursor: pointer; background: #555; padding: 8px 12px; border-radius: 5px; font-size: 14px; border: 1px solid #777; }
        .mute-toggle.active { background: #2ecc71; color: #000; font-weight: bold; }

        .workbench { background: var(--bg); width: 100%; height: 520px; position: relative; display: flex; justify-content: space-around; align-items: center; border: 2px solid #000; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #canvas_wires { z-index: 10; }
        #canvas_internal { z-index: 5; opacity: 0.6; }

        .device { background: #222; border: 2px solid #555; color: #eee; border-radius: 8px; padding: 15px; position: relative; z-index: 20; width: 110px; text-align: center; }
        .title-tag { position: absolute; top: -12px; left: 8px; font-size: 12px; background: #f1c40f; color: #000; padding: 2px 8px; font-weight: 900; }
        .node { width: 24px; height: 24px; background: #333; border: 3px solid #777; border-radius: 50%; position: absolute; cursor: crosshair; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; z-index: 100; }
        .node.active { background: #f1c40f; color: #000; border-color: #fff; }

        .lamp-box { width: 100px; height: 100px; border-radius: 50%; border: 4px dashed #444; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #111; margin: 0 auto; transition: 0.3s; }
        .lit { background: #fff700; box-shadow: 0 0 80px #fff700; border-color: #fff; }

        .footer { margin-top: 25px; display: flex; align-items: center; gap: 20px; width: 100%; }
        .tool { padding: 12px 25px; background: #444; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #status_msg { margin-left: auto; font-size: 20px; font-weight: 900; color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <div id="boom_layer">
        <h1 id="boom_quote" style="font-size: 70px; margin: 0; line-height: 1.2;">白痴啊！</h1>
        <h2 style="font-size: 30px; color: #fff; margin-top: 20px;">💥 短路燒掉了，重開啦！</h2>
    </div>
    
    <div class="header">
        <div style="font-size: 28px; font-weight: 900; color: #f1c40f;">⚡ 大哥 到底會不會啊</div>
        <div class="controls">
            <div id="muteToggle" class="mute-toggle active" onclick="toggleMute()">🔊 音效：開啟</div>
            <select id="workMode" onchange="initSystem()">
                <option value="direct">直連模式</option>
                <option value="single">單切模式</option>
                <option value="double">雙切模式</option>
                <option value="multi" selected>多切模式</option>
            </select>
            <button id="mainBtn" class="breaker" onclick="togglePower()">總電源 (OFF)</button>
        </div>
    </div>

    <div class="workbench" id="bench">
        <canvas id="canvas_internal"></canvas>
        <canvas id="canvas_wires"></canvas>

        <div class="device" style="height: 180px;">
            <div class="title-tag">電源</div>
            <div class="node" style="top:40px; right:-12px; border-color:#ff3d00;" data-id="L">L</div>
            <div class="node" style="top:90px; right:-12px; border-color:#2979ff;" data-id="N">N</div>
            <div class="node" style="top:140px; right:-12px; border-color:#4caf50;" data-id="G">G</div>
        </div>

        <div class="device" id="boxA" style="height: 240px;">
            <div class="title-tag">開關 A</div>
            <div class="node" style="top:50px; left:-12px;" data-id="A0">0</div>
            <div class="node" style="bottom:70px; right:-12px;" data-id="A1">1</div>
            <div class="node" style="bottom:30px; right:-12px;" data-id="A3">3</div>
            <button style="margin-top:120px; width:100%; cursor:pointer;" onclick="tap('A')">切換 A</button>
        </div>

        <div class="device" id="boxB" style="height: 240px; width: 130px;">
            <div class="title-tag">開關 B</div>
            <div class="node" style="top:40px; left:-12px;" data-id="B1in">1入</div>
            <div class="node" style="top:90px; left:-12px;" data-id="B3in">3入</div>
            <div class="node" style="top:40px; right:-12px;" data-id="B1out">1出</div>
            <div class="node" style="top:90px; right:-12px;" data-id="B3out">3出</div>
            <button style="margin-top:120px; width:100%; cursor:pointer;" onclick="tap('B')">切換 B</button>
        </div>

        <div class="device" id="boxC" style="height: 240px;">
            <div class="title-tag">開關 C</div>
            <div class="node" style="top:50px; right:-12px;" data-id="C0">0</div>
            <div class="node" style="bottom:70px; left:-12px;" data-id="C1">1</div>
            <div class="node" style="bottom:30px; left:-12px;" data-id="C3">3</div>
            <button style="margin-top:120px; width:100%; cursor:pointer;" onclick="tap('C')">切換 C</button>
        </div>

        <div class="device" style="width: 150px; height: 180px;">
            <div class="title-tag">燈具</div>
            <div id="lamp" class="lamp-box">💡</div>
            <div style="display:flex; justify-content: space-around; margin-top:20px;">
                <div class="node" data-id="LX" style="position:relative; border-color:#ff3d00;">L</div>
                <div class="node" data-id="NX" style="position:relative; border-color:#2979ff;">N</div>
                <div class="node" data-id="GX" style="position:relative; border-color:#4caf50;">G</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="tool" onclick="clearAll()">剪掉重拉</button>
        <button class="tool" onclick="demo()" style="color: #f1c40f;">正確示範</button>
        <div id="status_msg">現場：待命</div>
    </div>
</div>

<script>
    const quotes = ["白痴啊！", "天才啊！", "搞什麼！", "亂來！", "你到底會不會？", "牌照雞腿換的？", "大哥 等吃飯喔", "想領保險金？", "這接法...勇氣可嘉！"];
    const winQuotes = ["算你走運啦！", "勉強及格而已啦。", "亮是亮了，線拉得真醜。", "這次沒炸，算你命大。"];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMuted = false;

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('muteToggle');
        btn.innerText = isMuted ? "🔈 音效：關閉" : "🔊 音效：開啟";
        btn.className = isMuted ? "mute-toggle" : "mute-toggle active";
    }

    function playClick() {
        if(isMuted) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(450, t);
        osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.05);
        gain.gain.setValueAtTime(0.04, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(t + 0.05);
    }

    function playBoom() {
        if(isMuted) return;
        const t = audioCtx.currentTime;
        const noise = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        noise.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
    }

    let wires = [], startNode = null, powerOn = false, swS = {A:false, B:false, C:false};
    let liveNodes = new Set();

    function initSystem() {
        const m = document.getElementById('workMode').value;
        document.getElementById('boxA').style.opacity = (m==='direct') ? '0.2' : '1';
        document.getElementById('boxB').style.opacity = (m==='multi') ? '1' : '0.2';
        document.getElementById('boxC').style.opacity = (m==='double' || m==='multi') ? '1' : '0.2';
        clearAll();
    }

    function togglePower() {
        playClick();
        powerOn = !powerOn;
        const b = document.getElementById('mainBtn');
        b.innerText = powerOn ? "總電源 (ON)" : "總電源 (OFF)";
        b.className = `breaker ${powerOn?'on':''}`;
        if(!powerOn) document.getElementById('boom_layer').style.display = 'none';
        updateCircuit();
    }

    function tap(id) { 
        playClick();
        swS[id] = !swS[id]; 
        updateCircuit(); 
    }

    document.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('node')) {
            const id = e.target.dataset.id;
            if(!startNode) { startNode = id; e.target.classList.add('active'); } 
            else {
                if(startNode !== id) { wires.push([startNode, id]); updateCircuit(); }
                if(startNode) document.querySelector(`[data-id="${startNode}"]`).classList.remove('active');
                startNode = null;
            }
        }
    });

    function updateCircuit() {
        liveNodes.clear();
        if(powerOn) {
            let queue = ['L', 'G'], visited = new Set();
            while(queue.length > 0) {
                let curr = queue.shift();
                if(visited.has(curr)) continue;
                visited.add(curr); liveNodes.add(curr);
                wires.forEach(w => {
                    if(w[0] === curr) queue.push(w[1]);
                    if(w[1] === curr) queue.push(w[0]);
                });
                if(curr === 'A0') queue.push(swS.A ? 'A3' : 'A1');
                if(curr === 'A1' && !swS.A) queue.push('A0');
                if(curr === 'A3' && swS.A) queue.push('A0');
                if(curr === 'B1in') queue.push(swS.B ? 'B3out' : 'B1out');
                if(curr === 'B3in') queue.push(swS.B ? 'B1out' : 'B3out');
                if(curr === 'B1out') queue.push(swS.B ? 'B3in' : 'B1in');
                if(curr === 'B3out') queue.push(swS.B ? 'B1in' : 'B3in');
                if(curr === 'C0') queue.push(swS.C ? 'C3' : 'C1');
                if(curr === 'C1' && !swS.C) queue.push('C0');
                if(curr === 'C3' && swS.C) queue.push('C0');
            }
        }
        render();
        checkResult();
    }

    function render() {
        const b = document.getElementById('bench').getBoundingClientRect();
        const draw = (id, isInternal) => {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            c.width = b.width; c.height = b.height; ctx.clearRect(0,0,c.width,c.height);
            if(isInternal) {
                const drawI = (n1, n2) => {
                    const r1 = document.querySelector(`[data-id="${n1}"]`).getBoundingClientRect(), r2 = document.querySelector(`[data-id="${n2}"]`).getBoundingClientRect();
                    ctx.beginPath(); ctx.lineWidth = 3;
                    if(liveNodes.has(n1) && liveNodes.has(n2)) { ctx.strokeStyle = "#ff3d00"; ctx.setLineDash([]); } else { ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.setLineDash([5, 5]); }
                    ctx.moveTo(r1.left-b.left+12, r1.top-b.top+12); ctx.lineTo(r2.left-b.left+12, r2.top-b.top+12); ctx.stroke();
                };
                drawI('A0', swS.A ? 'A3' : 'A1');
                if(swS.B) { drawI('B1in', 'B3out'); drawI('B3in', 'B1out'); } else { drawI('B1in', 'B1out'); drawI('B3in', 'B3out'); }
                drawI('C0', swS.C ? 'C3' : 'C1');
            } else {
                wires.forEach(w => {
                    const n1 = document.querySelector(`[data-id="${w[0]}"]`), n2 = document.querySelector(`[data-id="${w[1]}"]`);
                    const r1 = n1.getBoundingClientRect(), r2 = n2.getBoundingClientRect();
                    ctx.beginPath(); ctx.lineWidth = 5; ctx.lineCap = "round";
                    let col = "#440000"; 
                    if(w.some(n=>n.includes('N'))) col = "#001a44";
                    if(w.some(n=>n.includes('G'))) col = "#003300";
                    if(liveNodes.has(w[0]) && liveNodes.has(w[1])) {
                        if(w.some(n=>n.includes('N'))) col = "#2979ff";
                        else if(w.some(n=>n.includes('G'))) col = "#4caf50";
                        else col = "#ff3d00";
                    }
                    ctx.strokeStyle = col;
                    ctx.moveTo(r1.left-b.left+12, r1.top-b.top+12); ctx.lineTo(r2.left-b.left+12, r2.top-b.top+12); ctx.stroke();
                });
            }
        };
        draw('canvas_internal', true); draw('canvas_wires', false);
    }

    function checkResult() {
        const has = (a, b) => wires.some(w => (w[0]===a && w[1]===b) || (w[0]===b && w[1]===a));
        const st = document.getElementById('status_msg');
        if(powerOn && liveNodes.has('N')) {
            playBoom();
            document.getElementById('boom_quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('boom_layer').style.display = 'flex';
            st.innerText = "現場：💥 燒啦！"; powerOn = false;
            const b = document.getElementById('mainBtn'); b.innerText = "總電源 (OFF)"; b.className = "breaker";
            return;
        }
        let lit = powerOn && liveNodes.has('LX') && has('N','NX');
        if(lit) { 
            document.getElementById('lamp').classList.add('lit'); 
            st.innerText = "師傅：" + winQuotes[Math.floor(Math.random() * winQuotes.length)]; 
        } else { 
            document.getElementById('lamp').classList.remove('lit'); 
            st.innerText = powerOn ? "現場：❌ 斷路中" : "現場：待命"; 
        }
    }

    function clearAll() { wires = []; liveNodes.clear(); if(powerOn) togglePower(); updateCircuit(); }
    function demo() {
        clearAll(); const m = document.getElementById('workMode').value;
        wires.push(['N','NX'], ['G','GX']);
        if(m==='direct') wires.push(['L','LX']);
        else if(m==='single') wires.push(['L','A0'], ['A1','LX']);
        else if(m==='double') wires.push(['L','A0'],['A1','C1'],['A3','C3'],['C0','LX']);
        else wires.push(['L','A0'],['A1','B1in'],['A3','B3in'],['B1out','C1'],['B3out','C3'],['C0','LX']);
        updateCircuit();
    }
    initSystem();
</script>
</body>
</html>
